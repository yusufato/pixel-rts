111<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel RTS - Strateji Savaşı</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Kaynak Paneli (Sol Üst) -->
    <div id="ui-resources">
        <div class="res"><span class="res-icon">💰</span> Para: <span id="money">1000</span></div>
    </div>

    <!-- Aşama Bilgisi -->
    <div id="ui-phase">
        <span id="phase-text">⚔️ BİRLİKLERİNİ YERLEŞTİR</span>
    </div>

    <!-- Birim Bilgi Paneli (Sağ Üst) -->
    <div id="ui-info">
        <div id="info-content">Bir birim seç veya üzerine gel</div>
    </div>

    <!-- Kamera İpucu -->
    <div id="ui-camera-hint">WASD veya fare kenarları ile haritayı kaydır</div>

    <!-- BAŞLAT Butonu -->
    <button id="start-btn">⚔️ SAVAŞI BAŞLAT!</button>

    <!-- AI Eğit Butonu -->
    <button id="train-ai-btn">🧠 AI Eğit (500 Maç)</button>

    <!-- Birim Üretim Paneli (Alt) -->
    <div id="ui-spawn-bar">
        <button class="spawn-btn" data-type="0" title="Piyade">
            <canvas class="btn-icon" data-col="0"></canvas>
            <div class="btn-label">Piyade</div>
            <div class="btn-cost">💰50</div>
        </button>
        <button class="spawn-btn" data-type="1" title="Mekanize Piyade">
            <canvas class="btn-icon" data-col="1"></canvas>
            <div class="btn-label">Mekanize</div>
            <div class="btn-cost">💰80</div>
        </button>
        <button class="spawn-btn" data-type="2" title="Zırhlı Piyade">
            <canvas class="btn-icon" data-col="2"></canvas>
            <div class="btn-label">Zırhlı Piy.</div>
            <div class="btn-cost">💰100</div>
        </button>
        <button class="spawn-btn" data-type="3" title="Keşif">
            <canvas class="btn-icon" data-col="3"></canvas>
            <div class="btn-label">Keşif</div>
            <div class="btn-cost">💰40</div>
        </button>
        <button class="spawn-btn" data-type="4" title="İstihkam">
            <canvas class="btn-icon" data-col="4"></canvas>
            <div class="btn-label">İstihkam</div>
            <div class="btn-cost">💰60</div>
        </button>
        <button class="spawn-btn" data-type="5" title="Sağlıkçı">
            <canvas class="btn-icon" data-col="5"></canvas>
            <div class="btn-label">Sağlıkçı</div>
            <div class="btn-cost">💰70</div>
        </button>
        <button class="spawn-btn" data-type="6" title="Tank">
            <canvas class="btn-icon" data-col="6"></canvas>
            <div class="btn-label">Tank</div>
            <div class="btn-cost">💰200</div>
        </button>
        <button class="spawn-btn" data-type="7" title="Tanksavar">
            <canvas class="btn-icon" data-col="7"></canvas>
            <div class="btn-label">Tanksavar</div>
            <div class="btn-cost">💰100</div>
        </button>
        <button class="spawn-btn" data-type="8" title="Topçu">
            <canvas class="btn-icon" data-col="8"></canvas>
            <div class="btn-label">Topçu</div>
            <div class="btn-cost">💰150</div>
        </button>
    </div>

    <!-- Taktik Destek Paneli (Sol Orta) -->
    <div id="ui-support" class="hidden">
        <button id="btn-paradrop" class="support-btn" title="3 Piyade İndir (150 para, 30s bekleme)">
            🪂 Paraşütçü
            <div class="support-cost">150 PARA</div>
            <div class="cooldown-overlay" id="cd-paradrop"></div>
        </button>
        <button id="btn-trench" class="support-btn" title="İstihkamcıya ücretsiz Siper + İkmal Alanı kurdur">
            🧱 Siper + İkmal
            <div class="support-free">ÜCRETSİZ</div>
        </button>
    </div>

    <!-- Minimap -->
    <canvas id="minimap"></canvas>

    <!-- AI Training Overlay -->
    <div id="ai-training-screen" class="hidden">
        <div class="game-over-box">
            <h1 id="game-over-title" style="color: #4cff7c; text-shadow: 0 0 20px rgba(76,255,124,0.5);">EVRİM SİMÜLASYONU</h1>
            <p style="color: #ccc; font-size: 10px; line-height: 1.5; margin-bottom: 20px;">Kendi kendine oynayarak kusursuz<br>Karşı-Birim (Counter) matrisini hesaplıyor...</p>
            <div style="width: 100%; height: 20px; background: #222; border: 2px solid #555; border-radius: 10px; overflow: hidden;">
                <div id="train-progress-bar" style="width: 0%; height: 100%; background: #4cff7c; transition: width 0.1s linear;"></div>
            </div>
            <div id="train-progress-text" style="color: #fff; font-size: 12px; margin-top: 15px;">%0 (0 / 500)</div>
        </div>
    </div>

    <!-- Game Over Ekranı -->
    <div id="game-over-screen" class="hidden">
        <div class="game-over-box">
            <h1 id="game-over-title">OYUN BİTTİ</h1>
            <div class="game-over-content">
                <div id="score-table"></div>
                <textarea id="battle-report-output" readonly></textarea>
            </div>
            <div class="battle-report-actions">
                <button id="copy-battle-report-btn">📋 Raporu Kopyala</button>
                <button id="download-battle-report-btn">💾 Raporu İndir</button>
            </div>
            <button id="restart-btn">🔄 Tekrar Oyna</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <img id="spriteSheet" src="icons.png" style="display:none;">
    <script src="js/brain.js"></script>
    <script src="js/globals.js"></script>
    <script src="js/TacticalAI.js"></script>
    <script src="js/Telemetry.js"></script>
    <script src="js/VFX.js"></script>
    <script src="js/Support.js"></script>
    <script src="js/Unit.js"></script>
    <script src="js/AI.js"></script>
    <script src="js/Foresight.js"></script>
    <script src="js/LayeredAI.js"></script>
    <script src="js/ControlPoints.js"></script>
    <script src="js/main.js"></script>
    <script src="js/Replay.js"></script>
    <script src="js/SelfPlay.js"></script>
</body>

</html>
